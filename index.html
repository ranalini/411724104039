<!DOCTYPE html>
<html>
<head>
    <title>My Website</title>
    <link rel="stylesheet" href="demo.css">
</head>

<body>

    <p>This is my first class</p>

    <h1>Heading 1</h1>
    <h2>Heading 2</h2>
    <h3>Heading 3</h3>
    <h4>Heading 4</h4>
    <h5>Heading 5</h5>
    <h6>Heading 6</h6>

    <img src="wallpaper pins.jpg" alt="Image">

    <br><br>

    <video width="500" controls>
        <source src="car.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <br><br>

    <table>
        <tr>
            <th>1</th>
            <th>2</th>
        </tr>
        <tr>
            <td>1st row 1st col</td>
            <td>1st row 2nd col</td>
        </tr>
        <tr>
            <td>2nd row 1st col</td>
            <td>2nd row 2nd col</td>
        </tr>
    </table>

    <br>

    <nav>
        <a href="https://google.com" target="_blank">Google</a>
        <a href="https://amazon.in" target="_blank">Amazon</a>
    </nav>

    <br>

    <form>
        <label>Email:</label>
        <input type="email"><br><br>

        <label>Password:</label>
        <input type="password"><br><br>

        <label>Gender:</label>
        <input type="radio" name="gender"> Male
        <input type="radio" name="gender"> Female
        <br><br>

        <label>Hobbies:</label>
        <input type="checkbox"> Basketball
        <input type="checkbox"> Singing
        <br><br>

        <label>Event Type:</label>
        <select>
            <option>Festival</option>
            <option>Birthday</option>
            <option>Other</option>
        </select>

        <br><br>

        <label>Address:</label><br>
        <textarea rows="4" cols="30"></textarea>

        <br><br>

        <button type="submit">Submit</button>
    </form>
    <div class="grid">
        <div class="one">1</div>
        <div class="two">2</div>
        <div class="three">3</div>
        <div class="four">4</div>
        <div class="five">5</div>
        <div class="six">6</div>
        <div>

    <div class="festival">
    
    <div id="festival" ><img src="cat.jpg">
    </div>
    <div id="festival" > <img src="wallpaper pins.jpg">
    </div>
    </div>
</body>
</html>
